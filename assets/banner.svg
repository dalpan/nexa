<svg width="100%" viewBox="0 0 720 220" role="img" xmlns="http://www.w3.org/2000/svg">
<title>NEXA — Credential &amp; Secret Scanner for Bug Bounty</title>
<desc>NEXA security tool banner</desc>
<defs>
  <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0a0f1a"/>
    <stop offset="100%" stop-color="#0d1117"/>
  </linearGradient>
  <linearGradient id="scan-grad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"/>
    <stop offset="50%" stop-color="#58a6ff" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="title-grad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#e6edf3"/>
    <stop offset="100%" stop-color="#58a6ff"/>
  </linearGradient>
</defs>

<!-- Background -->
<rect fill="url(#bg-grad)" width="720" height="220" rx="14"/>

<!-- Subtle grid -->
<g stroke="#1a2233" stroke-width="0.4" opacity="0.5">
  <line x1="0" y1="44" x2="720" y2="44"/>
  <line x1="0" y1="88" x2="720" y2="88"/>
  <line x1="0" y1="132" x2="720" y2="132"/>
  <line x1="0" y1="176" x2="720" y2="176"/>
  <line x1="90" y1="0" x2="90" y2="220"/>
  <line x1="180" y1="0" x2="180" y2="220"/>
  <line x1="270" y1="0" x2="270" y2="220"/>
  <line x1="360" y1="0" x2="360" y2="220"/>
  <line x1="450" y1="0" x2="450" y2="220"/>
  <line x1="540" y1="0" x2="540" y2="220"/>
  <line x1="630" y1="0" x2="630" y2="220"/>
</g>

<!-- Scan sweep line -->
<rect x="0" y="108" width="720" height="4" fill="url(#scan-grad)" rx="2"/>

<!-- Left bracket -->
<path d="M 52 66 L 42 66 L 42 154 L 52 154" fill="none" stroke="#58a6ff" stroke-width="2" stroke-linecap="round"/>
<!-- Right bracket -->
<path d="M 668 66 L 678 66 L 678 154 L 668 154" fill="none" stroke="#58a6ff" stroke-width="2" stroke-linecap="round"/>

<!-- Corner dots -->
<circle cx="42" cy="66"  r="3.5" fill="#3fb950"/>
<circle cx="42" cy="154" r="3.5" fill="#3fb950"/>
<circle cx="678" cy="66"  r="3.5" fill="#3fb950"/>
<circle cx="678" cy="154" r="3.5" fill="#f85149"/>

<!-- Main title -->
<text x="360" y="118" text-anchor="middle"
  font-family="'Courier New', Courier, monospace" font-size="78" font-weight="800"
  letter-spacing="14" fill="url(#title-grad)">NEXA</text>

<!-- Divider line -->
<line x1="220" y1="128" x2="500" y2="128" stroke="#58a6ff" stroke-width="1.5" opacity="0.8"/>

<!-- Subtitle -->
<text x="360" y="152" text-anchor="middle" fill="#8b949e"
  font-family="'Courier New', Courier, monospace" font-size="12.5" letter-spacing="3.5">CREDENTIAL &amp; SECRET SCANNER</text>

<!-- Version + language badges -->
<rect x="278" y="164" width="82" height="22" rx="5" fill="#1a2233"/>
<text x="319" y="179" text-anchor="middle" fill="#58a6ff"
  font-family="'Courier New', Courier, monospace" font-size="11" font-weight="600">v1.5.1</text>

<rect x="368" y="164" width="74" height="22" rx="5" fill="#1a2233"/>
<text x="405" y="179" text-anchor="middle" fill="#3fb950"
  font-family="'Courier New', Courier, monospace" font-size="11" font-weight="600">python 3.11+</text>

<!-- Traffic light dots (top right) -->
<circle cx="640" cy="48" r="3" fill="#d29922" opacity="0.75"/>
<circle cx="653" cy="48" r="3" fill="#3fb950" opacity="0.75"/>
<circle cx="666" cy="48" r="3" fill="#f85149" opacity="0.75"/>

<!-- Left signal bars -->
<rect x="62"  y="100" width="7" height="18" rx="1.5" fill="#58a6ff" opacity="0.65"/>
<rect x="76"  y="105" width="7" height="8"  rx="1.5" fill="#58a6ff" opacity="0.35"/>
<rect x="90"  y="97"  width="7" height="22" rx="1.5" fill="#58a6ff" opacity="0.5"/>
<rect x="104" y="108" width="7" height="6"  rx="1.5" fill="#58a6ff" opacity="0.2"/>

<!-- Right signal bars (red = finding) -->
<rect x="621" y="100" width="7" height="18" rx="1.5" fill="#f85149" opacity="0.65"/>
<rect x="635" y="105" width="7" height="8"  rx="1.5" fill="#f85149" opacity="0.45"/>
<rect x="649" y="103" width="7" height="12" rx="1.5" fill="#d29922" opacity="0.55"/>
</svg>
